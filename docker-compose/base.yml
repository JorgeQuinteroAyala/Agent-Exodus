version: '3.8'

services:
  exodus-agent:
    hostname: "exodus-agent.{{.Node.Hostname}}"
    deploy:
      mode: global
      restart_policy:
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: '3G'
      update_config:
        parallelism: 1
        order: start-first
      labels:
        traefik.enable: "true"
        traefik.http.services.exodus-agent.loadbalancer.server.port: 8080
    networks:
      - backend
    environment:
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft=Warning
      - Logging__LogLevel__System=Warning
      # Las variables Agent__ServiciosIgnorados, Agent__ServiciosSoloInterno y
      # Agent__DominiosBloqueados son SOLO fallback de bootstrap. La fuente de verdad
      # es el documento "actual" del índice "exodus-config" en Elasticsearch.
      # Si ese documento no existe al arrancar, el agente lo crea con estos valores.
      # - Agent__ServiciosIgnorados=[]
      # - Agent__ServiciosSoloInterno=[]
      # - Agent__DominiosBloqueados=[]
    user: "0:0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

networks:
  backend:
    external: true